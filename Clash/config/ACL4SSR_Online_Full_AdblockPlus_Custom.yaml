# override.yaml
proxy-groups:
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ♻️ 自动选择

  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🔯 故障转移
      - 🔮 负载均衡
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
      - 🇸🇬 狮城节点
      - 🇯🇵 日本节点
      - 🇺🇲 美国节点
      - 🇰🇷 韩国节点
      - 🌐 其他地区
      - 🚀 手动切换
      - DIRECT

  - name: 🚀 手动切换
    type: select
    include-all: true


  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50

  - name: 🔯 故障转移
    type: fallback
    include-all: true
    interval: 300
    tolerance: 50

  - name: 🔮 负载均衡
    type: load-balance
    include-all: true
    interval: 300
    tolerance: 50

  # 地区节点组
  - name: 🇭🇰 香港节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(港|香港|HK|hk|Hong Kong|HongKong|hongkong|hong kong|🇭🇰)"

  - name: 🇯🇵 日本节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|🇯🇵)"

  - name: 🇺🇲 美国节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"

  - name: 🇨🇳 台湾节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(台|新北|彰化|TW|Taiwan)"

  - name: 🇸🇬 狮城节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(新加坡|坡|狮城|SG|Singapore)"

  - name: 🇰🇷 韩国节点
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(KR|Korea|KOR|首尔|韩|韓)"

  - name: 🌐 其他地区
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(^(?!.*(香港|HK|Hong Kong|🇭🇰|HongKong|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|新加坡|坡|狮城|SG|Singapore|台|新北|彰化|TW|Taiwan|KR|Korea|KOR|首尔|韩|韓|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)).*)"

  - name: 🎥 奈飞节点
    type: select
    include-all: true
    interval: 300
    tolerance: 50
    filter: "(NF|奈飞|解锁|Netflix|NETFLIX|Media)"

